<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice Monkey - Coming Soon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }
        
        .logo {
            font-size: 5rem;
            margin-bottom: 1rem;
            animation: bounce 2s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
        h1 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #e94560 0%, #ff6b6b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .tagline {
            font-size: 1.25rem;
            color: #a0a0a0;
            margin-bottom: 3rem;
        }
        
        .construction {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
        }
        
        .construction-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        
        .construction h2 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: #ffd93d;
        }
        
        .construction p {
            color: #a0a0a0;
            line-height: 1.6;
        }
        
        .features {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }
        
        .feature {
            text-align: center;
        }
        
        .feature-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        
        .feature-label {
            font-size: 0.875rem;
            color: #a0a0a0;
        }
        
        .notify {
            background: linear-gradient(135deg, #e94560 0%, #ff6b6b 100%);
            color: white;
            border: none;
            padding: 1rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .notify:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(233, 69, 96, 0.3);
        }
        
        .footer {
            margin-top: 3rem;
            font-size: 0.875rem;
            color: #666;
        }
        
        .footer a {
            color: #e94560;
            text-decoration: none;
        }
        
        @media (max-width: 600px) {
            h1 {
                font-size: 2rem;
            }
            
            .logo {
                font-size: 3rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🐵</div>
        <h1>Invoice Monkey</h1>
        <p class="tagline">Automatic invoice processing for QuickBooks</p>
        
        <div class="construction">
            <div class="construction-icon">🚧</div>
            <h2>Under Construction</h2>
            <p>We're building something special. A smarter way to handle invoices that saves you hours every month.</p>
        </div>
        
        <div class="features">
            <div class="feature">
                <div class="feature-icon">📄</div>
                <div class="feature-label">PDF Extraction</div>
            </div>
            <div class="feature">
                <div class="feature-icon">🤖</div>
                <div class="feature-label">AI Processing</div>
            </div>
            <div class="feature">
                <div class="feature-icon">📊</div>
                <div class="feature-label">QuickBooks Sync</div>
            </div>
        </div>
        
        <button class="notify" onclick="alert('Thanks for your interest! We\'ll notify you when we launch.')">
            Notify Me When Ready
        </button>
        
        <div class="footer">
            <p>Questions? <a href="mailto:hello@invoicemonkey.app">hello@invoicemonkey.app</a></p>
        </div>
    </div>
</body>
</html>
